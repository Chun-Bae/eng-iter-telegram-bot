name: Eng Study Telegram Bot Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_ADDR }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/eng-iter-telegram-bot
            cd ~/eng-iter-telegram-bot

            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi

            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate
            pip install --upgrade pip
            if [ -f "requirements.txt" ]; then
              pip install -r requirements.txt
            fi

            printf "TELEGRAM_TOKEN_CONV=${{ secrets.TELEGRAM_TOKEN_CONV }}\nTELEGRAM_TOKEN_TOEIC=${{ secrets.TELEGRAM_TOKEN_TOEIC }}\n" > .env

            mkdir -p db

            # study.db -> db/conv.db 마이그레이션 (최초 1회)
            if [ -f "study.db" ] && [ ! -f "db/conv.db" ]; then
              cp study.db db/conv.db
              echo "[migrate] study.db -> db/conv.db"
            fi

            sudo cp ~/eng-iter-telegram-bot/scripts/convbot.service /etc/systemd/system/convbot.service
            sudo cp ~/eng-iter-telegram-bot/scripts/toeicbot.service /etc/systemd/system/toeicbot.service
            sudo systemctl daemon-reload
            sudo systemctl enable convbot toeicbot
            sudo systemctl restart convbot toeicbot